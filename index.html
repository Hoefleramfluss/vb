<!DOCTYPE html>
<html lang="de" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VoxOn.ai – Next-Gen Voice & Chat Agents mit WOW-Effekt</title>
  <meta name="description" content="VoxOn.ai liefert hyperschnelle Voice- & Chat-Agenten mit futuristischem Interface, DSGVO-Sicherheit und messbarem ROI. Entdecke Next-Gen Automatisierung für Praxis, Werkstatt & Gastro.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root {
      --voxon-black: #000000;
      --voxon-ink: #020409;
      --voxon-panel: rgba(18, 24, 36, 0.75);
      --voxon-white: #ffffff;
      --voxon-blue: #3AB4F2;
      --voxon-light-blue: #6EE7FF;
      --voxon-cyan: #00E5FF;
      --voxon-purple: #8B5CF6;
      --voxon-silver: #D9D9D9;
      --voxon-gradient: linear-gradient(135deg, rgba(58, 180, 242, 0.9) 0%, rgba(139, 92, 246, 0.85) 45%, rgba(0, 229, 255, 0.9) 100%);
    }

    body {
      background: radial-gradient(circle at 20% -10%, rgba(110, 231, 255, 0.24), transparent 45%),
                  radial-gradient(circle at 80% -20%, rgba(139, 92, 246, 0.16), transparent 55%),
                  linear-gradient(180deg, #010104 0%, #020712 45%, #04080f 100%);
      font-family: 'Montserrat', 'Space Grotesk', system-ui, -apple-system, sans-serif;
      color: var(--voxon-white);
    }

    .aurora-glow {
      border-radius: 9999px;
      filter: blur(120px);
      animation: aurora-float 18s ease-in-out infinite alternate;
      background: radial-gradient(circle at 50% 50%, rgba(110, 231, 255, 0.65), rgba(58, 180, 242, 0) 70%);
    }

    .tech-grid::before {
      content: '';
      position: absolute;
      inset: -1px;
      background: linear-gradient(120deg, rgba(58, 180, 242, 0.35), rgba(139, 92, 246, 0.25), rgba(0, 229, 255, 0.3));
      border-radius: 24px;
      opacity: 0.6;
      z-index: -1;
      filter: blur(18px);
    }

    .glass-panel {
      background: linear-gradient(135deg, rgba(18, 30, 48, 0.78) 0%, rgba(12, 18, 28, 0.65) 100%);
      border: 1px solid rgba(110, 231, 255, 0.18);
      box-shadow: 0 20px 70px rgba(10, 22, 41, 0.55);
      backdrop-filter: blur(22px);
    }

    .neon-button {
      position: relative;
      overflow: hidden;
      background: var(--voxon-gradient);
      transition: transform 0.35s ease, box-shadow 0.35s ease;
      box-shadow: 0 0 0 rgba(0, 229, 255, 0.0);
    }

    .neon-button::after {
      content: '';
      position: absolute;
      inset: -20%;
      background: radial-gradient(circle at 20% 20%, rgba(255, 255, 255, 0.45), transparent 55%);
      opacity: 0;
      transition: opacity 0.35s ease;
    }

    .neon-button:hover {
      transform: translateY(-4px) scale(1.01);
      box-shadow: 0 18px 45px rgba(0, 229, 255, 0.35);
    }

    .neon-button:hover::after {
      opacity: 1;
    }

    .outline-button {
      border: 1px solid rgba(110, 231, 255, 0.35);
      background: rgba(12, 18, 28, 0.4);
      transition: all 0.35s ease;
    }

    .outline-button:hover {
      border-color: rgba(139, 92, 246, 0.55);
      color: var(--voxon-light-blue);
      transform: translateY(-2px);
    }

    .halo-border {
      position: relative;
    }

    .halo-border::before {
      content: '';
      position: absolute;
      inset: -1px;
      border-radius: inherit;
      padding: 1px;
      background: linear-gradient(135deg, rgba(58, 180, 242, 0.65), rgba(0, 229, 255, 0.4), rgba(139, 92, 246, 0.55));
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
    }

    @keyframes aurora-float {
      0% { transform: translate(-50%, -45%) scale(1); }
      50% { transform: translate(-55%, -55%) scale(1.2); }
      100% { transform: translate(-45%, -50%) scale(0.95); }
    }

    @keyframes marquee {
      0% { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }

    .marquee-track {
      display: flex;
      gap: 3rem;
      width: 200%;
      animation: marquee 32s linear infinite;
    }

    .marquee-item {
      flex: none;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem 1.5rem;
      border-radius: 9999px;
      background: rgba(15, 25, 38, 0.78);
      border: 1px solid rgba(110, 231, 255, 0.25);
      box-shadow: inset 0 0 25px rgba(0, 229, 255, 0.18);
      color: var(--voxon-silver);
      font-weight: 500;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .stat-card {
      background: rgba(10, 14, 22, 0.8);
      border: 1px solid rgba(58, 180, 242, 0.25);
      box-shadow: 0 25px 80px rgba(10, 20, 40, 0.6);
      backdrop-filter: blur(18px);
    }

    .tech-card {
      background: rgba(8, 12, 20, 0.9);
      border: 1px solid rgba(110, 231, 255, 0.2);
      backdrop-filter: blur(18px);
      box-shadow: 0 35px 90px rgba(6, 12, 24, 0.65);
    }

    @media (max-width: 768px) {
      body {
        background: linear-gradient(180deg, #010104 0%, #050913 100%);
      }
      .marquee-track {
        animation-duration: 26s;
      }
    }
  </style>
  <script type="importmap">

    "imports": {
      "react": "https://aistudiocdn.com/react@^19.1.1",

      "react/": "https://aistudiocdn.com/react@^19.1.1/"
    }
  }
  </script>
</head>
<body class="bg-transparent">
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
